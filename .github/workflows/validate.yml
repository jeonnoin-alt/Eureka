name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate JSON files
        run: |
          set -e
          for f in package.json .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json; do
            echo "Validating $f..."
            python3 -m json.tool "$f" > /dev/null
          done
          echo "All JSON files valid."

      - name: Validate session-start hook syntax
        run: |
          bash -n hooks/session-start
          echo "hooks/session-start: bash syntax OK"

      - name: Validate skill frontmatter
        run: python3 .github/scripts/validate-skills.py

      - name: Check eureka:* cross-references
        run: python3 .github/scripts/check-references.py

      - name: Verify session-start produces valid hook output
        run: |
          export CLAUDE_PLUGIN_ROOT="$GITHUB_WORKSPACE"
          bash hooks/session-start | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          ctx = d.get('hookSpecificOutput', {}).get('additionalContext', '')
          assert len(ctx) > 100, f'context too short: {len(ctx)} chars'
          assert 'using-eureka' in ctx, 'using-eureka content not in injected context'
          print(f'Hook output OK: {len(ctx)} chars, using-eureka injected')
          "
